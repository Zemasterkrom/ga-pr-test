name: Testing

on:
  push:
    branches:
      - development
      - main
      - "[0-9]+.[0-9]+"
  pull_request:
    branches:
      - development
      - main
      - "[0-9]+.[0-9]+"

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php: [7.4, 8.0, 8.4]
        symfony: [^5.4, ^6.0, ^7.0]
        exclude:
          - php: 7.4
            symfony: ^6.0
          - php: 8.0
            symfony: ^6.0
          - php: 7.4
            symfony: ^7.0
          - php: 8.0
            symfony: ^7.0
      fail-fast: false
    name: PHPUnit | PHPStan (PHP ${{ matrix.php }}, Symfony ${{ matrix.symfony }})

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup PHP environment and dependencies
        uses: ./.github/actions/setup-php-env
        with:
          php-version: ${{ matrix.php }}
          symfony-version: ${{ matrix.symfony }}

      - name: Setup Firefox environment
        uses: ./.github/actions/setup-firefox-env
        with:
          version: 133.0

      - name: Run PHPUnit tests
        run: composer phpunit

      - name: Run PHPStan tests
        run: composer phpstan

  code-coverage:
    runs-on: ubuntu-latest
    name: Code coverage

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup PHP environment and dependencies
        uses: ./.github/actions/setup-php-env
        with:
          php-version: 7.4
          symfony-version: ^5.4

      - name: Setup Firefox environment
        uses: ./.github/actions/setup-firefox-env
        with:
          version: 133.0

      - name: Run PHPUnit tests with coverage report
        run: composer phpunit -- --coverage-clover ./coverage.xml

      - name: Upload coverage report to Codecov
        uses: codecov/codecov-action@v3
        if: ${{ !env.ACT }}
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.xml
