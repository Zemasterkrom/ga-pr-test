name: Testing

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php: [8.2, 8.4]
        symfony: [^5.4, ^6.0, ^7.0]
      fail-fast: false
    name: PHPUnit | PHPStan (PHP ${{ matrix.php }}, Symfony ${{ matrix.symfony }})

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup PHP environment and dependencies
        uses: ./.github/actions/setup-php-env
        with:
          php-version: ${{ matrix.php }}
          symfony-version: ${{ matrix.symfony }}

      - name: Setup Firefox environment
        uses: ./.github/actions/setup-firefox-env
        with:
          version: "133.0"

      - name: Run PHPUnit tests
        run: composer phpunit

      - name: Run PHPStan tests
        run: composer phpstan

  code-styling:
    runs-on: ubuntu-latest
    name: Code styling

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup PHP environment and dependencies
        uses: ./.github/actions/setup-php-env
        with:
          php-version: 8.2
          symfony-version: ^5.4

      - name: Check code styling with PHP CS Fixer (no Docker)
        run: composer php-cs-fixer -- check --diff --no-ansi > php-cs-fixer.diff

      - name: Upload PHP CS Fixer failure report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: php-cs-fixer-report
          path: php-cs-fixer.diff

      - name: Check code styling with PHP CS Fixer (Docker)
        run: composer php-cs-fixer:docker -- check

  code-coverage:
    runs-on: ubuntu-latest
    name: Code coverage

    steps:
      - name: Check Codecov token availability
        shell: bash
        run: |
          if [ -n "$HAS_CODECOV_TOKEN" ]; then
            echo "HAS_CODECOV_TOKEN=true" >> $GITHUB_ENV
          else
            echo "HAS_CODECOV_TOKEN=false" >> $GITHUB_ENV
          fi
        env:
          HAS_CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Checkout repository
        if: env.HAS_CODECOV_TOKEN == 'true'
        uses: actions/checkout@v6

      - name: Setup PHP environment and dependencies
        if: env.HAS_CODECOV_TOKEN == 'true'
        uses: ./.github/actions/setup-php-env
        with:
          php-version: 8.2
          symfony-version: ^5.4

      - name: Setup Firefox environment
        if: env.HAS_CODECOV_TOKEN == 'true'
        uses: ./.github/actions/setup-firefox-env
        with:
          version: "133.0"

      - name: Run PHPUnit tests with coverage report
        if: env.HAS_CODECOV_TOKEN == 'true'
        run: composer phpunit -- --coverage-clover ./coverage.xml

      - name: Upload coverage report to Codecov
        if: env.HAS_CODECOV_TOKEN == 'true'
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.xml
          fail_ci_if_error: true
